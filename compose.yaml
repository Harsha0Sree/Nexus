
services:
    db:
        image: postgres:16
        environment:
            POSTGRES_USER: mikey
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: nexus
        ports: 
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7
    
    localstack:
        image: localstack/localstack
        ports: 
            - "4566:4566"



    app:
        build: .
        depends_on:
            - db
        ports: 
            - "8000:8000"
        
volumes:
    postgres_data: